name: upralliseva_app
description: ಪೂಜಾ ದಾಖಲೆ — Upralli Seva (Android app, shares Firestore with the web app)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.4
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansKannada
      fonts:
        - asset: assets/fonts/NotoSansKannada-Regular.ttf
