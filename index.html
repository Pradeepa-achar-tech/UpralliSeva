<!DOCTYPE html>
<html lang="kn" translate="no" class="notranslate">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- ಬ್ರೌಸರ್‌ನ ಅನುವಾದ ಸೂಚನೆ ತೋರಿಸದಂತೆ -->
<meta name="google" content="notranslate" />
<title>ಉಪ್ರಳ್ಳಿ ಸೇವೆ</title>
<link rel="icon" href="logo.png" />

<!-- ಕನ್ನಡ ಫಾಂಟ್ (ಸ್ಥಳೀಯ — ಇಂಟರ್ನೆಟ್ ಬೇಕಿಲ್ಲ) -->
<link href="assets/kannada-font.css" rel="stylesheet">

<style>
  :root{
    --ink:#1f2430; --line:#000; --muted:#6b7280;
    --accent:#e9730c; --accent-dark:#c25e00; --accent-soft:#fff3e8;
    --bg:#f4f5f7; --reg-bg:#f7f8fa; --card-line:#ececf1;
    --side1:#2a2e3a; --side2:#1b1e27;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    font-family:"Noto Sans Kannada", "Nirmala UI", "Tunga", "Kedage", system-ui, sans-serif;
    color:var(--ink); background:var(--bg);
    font-size:13px; line-height:1.35;
  }

  /* ====================== ಲೇಔಟ್: ಸೈಡ್‌ಬಾರ್ + ವಿಷಯ ====================== */
  #app{ display:flex; min-height:100vh; align-items:stretch; }

  #sidebar{
    width:248px; flex-shrink:0; position:sticky; top:0; align-self:flex-start;
    height:100vh; overflow-y:auto;
    background:linear-gradient(180deg,var(--side1),var(--side2));
    color:#cdd1dc; padding:18px 14px; display:flex; flex-direction:column; gap:20px;
    box-shadow:2px 0 18px rgba(0,0,0,.10);
  }
  #sidebar .brand{ display:flex; align-items:center; gap:10px; padding-bottom:4px; }
  #sidebar .brand img{ width:40px; height:40px; border-radius:10px; background:#fff; padding:3px; object-fit:contain; }
  #sidebar .brand span{ font-weight:800; font-size:17px; letter-spacing:.2px; color:#fff; }
  .side-group{ display:flex; flex-direction:column; gap:8px; }
  .side-label{ font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; color:#7e859a; font-weight:700; }
  .side-actions{ border-top:1px solid rgba(255,255,255,.09); padding-top:16px; }
  .side-foot{ margin-top:auto; border-top:1px solid rgba(255,255,255,.09); padding-top:14px; display:flex; flex-direction:column; gap:8px; }
  .side-foot .hint{ color:#9aa0b3; opacity:.95; min-height:1em; }

  /* ಸೈಡ್‌ಬಾರ್ — ಗಾಢ ಥೀಮ್ ಬಟನ್‌ಗಳು */
  #sidebar .jump{ width:100%; max-width:none; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14); color:#eef0f5; }
  /* ತೆರೆದ dropdown ಆಯ್ಕೆಗಳು ಬಿಳಿ ಹಿನ್ನೆಲೆಯ ಮೇಲೆ ಗಾಢ ಪಠ್ಯ (ಇಲ್ಲದಿದ್ದರೆ ಬಿಳಿ-ಮೇಲೆ-ಬಿಳಿ) */
  #sidebar .jump option{ color:#1f2430; background:#fff; }
  #sidebar button.tb{
    width:100%; text-align:left;
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); color:#dfe2ea;
  }
  #sidebar button.tb:hover{ background:rgba(255,255,255,.13); }
  #sidebar button.tb.primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
  #sidebar button.tb.primary:hover{ filter:brightness(1.05); }
  #sidebar button.tb.warn{ background:rgba(255,90,90,.12); border-color:rgba(255,120,120,.32); color:#ff9d9d; }

  /* ಸಾಮಾನ್ಯ ಬಟನ್ (ಮೋಡಲ್/ವಿಷಯ) — ತಟಸ್ಥ */
  button.tb{
    font-family:inherit; font-size:13px; cursor:pointer;
    border:1px solid #d7d9e0; background:#fff; color:#2a2f3a;
    padding:9px 13px; border-radius:9px; font-weight:600;
  }
  button.tb:hover{ background:#f5f6f8; }
  button.tb.primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
  button.tb.primary:hover{ filter:brightness(1.03); }
  button.tb.warn{ color:#c0392b; border-color:#e7c6c2; background:#fff; }
  .hint{ font-size:11.5px; }
  .jump{ font-family:inherit; font-size:13px; padding:8px 9px; border:1px solid #d7d9e0; border-radius:9px; background:#fff; color:#333; }

  .content{ flex:1; min-width:0; padding:22px 24px; }
  .topbar{ display:none; }   /* ಡೆಸ್ಕ್‌ಟಾಪ್‌ನಲ್ಲಿ ಮರೆ; ಮೊಬೈಲ್‌ನಲ್ಲಿ ಕಾಣಿಸುತ್ತದೆ */
  .sb-backdrop{ display:none; }

  /* ---------- A4 ಹಾಳೆ ---------- */
  #sheet{
    width:210mm; min-height:297mm;
    margin:0 auto; padding:12mm 10mm;
    background:#fff; box-shadow:0 0 12px rgba(0,0,0,.12); border-radius:14px;
  }
  .doc-title{ text-align:center; font-weight:700; font-size:15px; margin:0 0 10px; padding-bottom:8px; border-bottom:2px solid var(--line); }
  .legend{ text-align:center; font-size:11px; color:#333; margin:-4px 0 14px; }
  .legend b{ font-weight:600; }

  /* ---------- ಡ್ಯಾಶ್‌ಬೋರ್ಡ್ ಅಂಕಿಅಂಶ ಕಾರ್ಡ್‌ಗಳು (ಮುದ್ರಣದಲ್ಲಿ ಕಾಣಿಸದು) ---------- */
  .dash{ display:flex; flex-wrap:wrap; gap:12px; margin:0 0 18px; }
  .dash .card{
    flex:1; min-width:120px; background:#fff; border:1px solid var(--card-line);
    border-radius:14px; padding:14px 16px; box-shadow:0 1px 3px rgba(16,24,40,.05);
    position:relative;
  }
  .dash .card::before{ content:""; position:absolute; left:0; top:14px; bottom:14px; width:3px; border-radius:3px; background:var(--accent); }
  .dash .card .v{ font-size:24px; font-weight:800; color:var(--ink); line-height:1.1; }
  .dash .card .l{ font-size:11.5px; color:var(--muted); margin-top:3px; font-weight:600; }
  @media print{ .dash{ display:none !important; } }

  .region{ margin:0 0 16px; border:1.5px solid var(--line); }
  .region-head{
    display:flex; align-items:center; gap:8px;
    background:var(--reg-bg); padding:6px 8px; border-bottom:1.5px solid var(--line);
  }
  /* ಪರದೆಯಲ್ಲಿ ಆಧುನಿಕ ಕಾರ್ಡ್ ಶೈಲಿ (ಮುದ್ರಣ ಕಪ್ಪು ಗಡಿ ಉಳಿಯುತ್ತದೆ) */
  @media screen{
    #sheet{ border-radius:16px; border:1px solid var(--card-line); }
    .region{ border:1px solid var(--card-line); border-radius:14px; overflow:hidden; box-shadow:0 1px 3px rgba(16,24,40,.05); }
    .region-head{ background:#fbfbfd; border-bottom:1px solid var(--card-line); }
    .region-head .no{ display:inline-flex; align-items:center; justify-content:center; min-width:24px; height:24px; padding:0 6px; border-radius:7px; background:var(--accent-soft); color:var(--accent-dark); font-size:12px; }
    .region-head .rname{ color:var(--ink); }
    thead th{ background:#f7f8fa !important; color:#48506a; }
    td.c-name [contenteditable]:focus{ background:#fff7e8; }
  }
  .region-head .no{ font-weight:700; min-width:26px; }
  .region-head .rname{ font-weight:700; font-size:13.5px; flex:1; }
  .region-head .rphone{ font-size:12px; white-space:nowrap; }
  .region-head .rphone::before{ content:"ಮೊ: "; color:#444; }

  table{ width:100%; border-collapse:collapse; }
  th,td{ border:1px solid var(--line); padding:3px 5px; vertical-align:top; }
  thead th{ background:#f0f0f0; font-size:11px; font-weight:600; text-align:center; }
  th.c-no,td.c-no{ width:30px; text-align:center; }
  th.c-name{ text-align:left; }
  th.c-chk,td.c-chk{ width:34px; text-align:center; }
  td.c-name{ text-align:left; }
  td.c-name [contenteditable]{ outline:none; min-height:1em; display:block; }
  td.c-name [contenteditable]:focus{ background:#fff7cc; }

  /* ಚೆಕ್‌ಬಾಕ್ಸ್ — ಗುರುತಿಸಿದರೆ ಬಾಕ್ಸ್ ಇಲ್ಲದೆ ಬರೀ ✓ ತೋರಿಸು */
  input[type=checkbox]{
    -webkit-appearance:none; appearance:none;
    width:16px; height:16px; margin:0; cursor:pointer;
    border:none; background:transparent; outline:none;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:15px; line-height:1; color:#111;
  }
  input[type=checkbox]:checked::after{ content:"✓"; }
  input[type=checkbox]:hover{ background:#eee; border-radius:3px; }

  /* ಸಾಲು ಅಳಿಸುವ ಗುಂಡಿ */
  td.c-del{ width:26px; text-align:center; }
  .rowdel{ border:none; background:transparent; color:#b00; cursor:pointer; font-size:15px; line-height:1; }
  .rowctrl{ padding:5px 8px; background:#f5f7f9; }
  .rowctrl button{ font-family:inherit; font-size:12px; cursor:pointer; border:1px dashed #9aa6b2; background:#fff; padding:4px 9px; border-radius:6px; }
  .empty-note{ padding:8px; font-size:12px; color:#999; font-style:italic; }

  /* ---------- ಮುದ್ರಣ / PDF ---------- */
  @page{ size:A4; margin:10mm; }
  @media print{
    html,body{ background:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .toolbar{ display:none !important; }
    #sheet{ width:auto; min-height:0; margin:0; padding:0; box-shadow:none; }
    .region{ break-inside:auto; page-break-inside:auto; }
    .region-head{ break-after:avoid; page-break-after:avoid; }
    thead{ display:table-header-group; }     /* ಪ್ರತಿ ಪುಟದಲ್ಲೂ ಶೀರ್ಷಿಕೆ ಸಾಲು */
    tr{ break-inside:avoid; page-break-inside:avoid; }
    td.c-del, th.c-del{ display:none !important; }
    .no-print{ display:none !important; }
    #login{ display:none !important; }
  }
  /* PDF ರಫ್ತು ಮಾಡುವಾಗ ಸಂಪಾದನಾ ನಿಯಂತ್ರಣ ಮರೆಮಾಡಲು */
  body.exporting .no-print{ display:none !important; }
  body.exporting td.c-del{ display:none; }

  /* ಲಾಗಿನ್ ಆಗದಿದ್ದರೆ ಸಂಪಾದನಾ ನಿಯಂತ್ರಣಗಳನ್ನು ಮರೆಮಾಡು (ವೀಕ್ಷಣೆ ಮಾತ್ರ) */
  body:not(.editing) .edit-only{ display:none !important; }

  /* ಲಾಗಿನ್ ಆದಾಗ — ಹೆಸರು/ಮಾಗಣೆ ಸಂಪಾದಿಸಬಹುದು ಎಂದು ತೋರಿಸಲು ಸೂಚನೆ (ಮುದ್ರಣದಲ್ಲಿ ಕಾಣಿಸದು) */
  body.editing td.c-name [contenteditable]{
    cursor:text; border-bottom:1px dashed #b9c6d3; padding-bottom:1px;
  }
  body.editing td.c-name [contenteditable]:hover{ background:#f1f7ff; }
  body.editing .region-head [contenteditable]{ cursor:text; }
  body.editing .region-head .rname:hover{ background:#eef4fb; border-radius:3px; }
  @media print{
    td.c-name [contenteditable]{ border-bottom:none !important; }
  }

  /* ---------- ಲಾಗಿನ್ ಪರದೆ ---------- */
  #login{
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg); padding:24px;
  }
  #login .card{
    background:#fff; border:1px solid #cdd3da; border-radius:14px;
    padding:34px 30px; box-shadow:0 8px 28px rgba(0,0,0,.12);
    max-width:380px; width:100%; text-align:center;
  }
  #login .logo{ width:96px; height:96px; object-fit:contain; margin:0 auto 8px; display:block; }
  #login h2{ margin:0 0 6px; font-size:20px; font-weight:700; }
  #login p{ margin:0 0 20px; color:var(--muted); font-size:13px; line-height:1.5; }
  #login .gbtn{
    font-family:inherit; font-size:15px; font-weight:600; cursor:pointer;
    border:1px solid var(--accent); background:var(--accent); color:#fff;
    padding:11px 22px; border-radius:9px; display:inline-flex; align-items:center; gap:8px;
  }
  #login .gbtn:hover{ filter:brightness(1.05); }
  #login .err{ color:#a40000; font-size:12.5px; min-height:1.2em; margin-top:14px; }
  #login .checking{ color:var(--muted); font-size:12.5px; min-height:1.2em; margin-top:14px; }

  /* ಲಾಗಿನ್ ಆಗುವವರೆಗೆ ಆ್ಯಪ್ ಮರೆ; ಆದ ಮೇಲೆ ಲಾಗಿನ್ ಪರದೆ ಮರೆ */
  body:not(.authed) #app{ display:none !important; }
  body.authed #login{ display:none !important; }

  /* ಟೇಬಲ್ ಸುತ್ತುವಿಕೆ — ಸಣ್ಣ ಪರದೆಯಲ್ಲಿ ಅಡ್ಡ ಸ್ಕ್ರಾಲ್ */
  .tbl{ width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }

  /* ಮಾಗಣೆ ತೆರೆ/ಮುಚ್ಚು */
  .rtoggle{
    border:none; background:transparent; cursor:pointer; font-size:13px;
    color:var(--accent-dark); width:24px; height:24px; line-height:1; padding:0;
    flex-shrink:0; border-radius:6px; transition:transform .15s, background .15s;
  }
  .rtoggle:hover{ background:var(--accent-soft); }
  .region.collapsed .rtoggle{ transform:rotate(-90deg); }
  .region.collapsed .tbl, .region.collapsed .rowctrl{ display:none; }
  .rcount{ font-size:11px; background:var(--accent-soft); color:var(--accent-dark); padding:1px 9px; border-radius:10px; white-space:nowrap; font-weight:700; }
  @media print{ .region.collapsed .tbl{ display:block !important; } }

  /* ---------- ಸುಂದರ ಮಾಗಣೆ dropdown (custom) ---------- */
  .mpick{ position:relative; }
  .mpick-btn{ display:flex; align-items:center; justify-content:space-between; gap:8px; width:100%; }
  .mpick-caret{ opacity:.7; transition:transform .15s; }
  .mpick.open .mpick-caret{ transform:rotate(180deg); }
  .mpick-panel{
    display:none; position:fixed; z-index:120;
    background:#fff; color:var(--ink);
    border:1px solid var(--card-line); border-radius:12px;
    box-shadow:0 16px 40px rgba(16,24,40,.28);
    max-height:min(60vh,420px); overflow-y:auto; padding:6px;
  }
  .mpick.open .mpick-panel{ display:block; animation:modalpop .12s ease; }
  .mpick-item{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:9px 11px; border-radius:9px; cursor:pointer; font-size:13px; color:var(--ink);
  }
  .mpick-item:hover{ background:var(--accent-soft); color:var(--accent-dark); }
  .mpick-badge{ background:#eef0f4; color:#56607a; font-size:11px; font-weight:700; padding:1px 9px; border-radius:9px; flex-shrink:0; }
  @media print{ .mpick{ display:none !important; } }

  /* ================= ರೆಸ್ಪಾನ್ಸಿವ್ (ಪರದೆ ಮಾತ್ರ; ಮುದ್ರಣ A4 ಉಳಿಯುತ್ತದೆ) ================= */
  @media screen and (max-width: 1100px){
    #sheet{ width:100%; max-width:100%; padding:14px 12px; }
  }
  @media screen and (max-width: 860px){
    /* ಸೈಡ್‌ಬಾರ್ → ಸ್ಲೈಡ್-ಇನ್ ಡ್ರಾಯರ್ + ಮೇಲ್ಭಾಗ ಪಟ್ಟಿ */
    #sidebar{
      position:fixed; left:0; top:0; height:100vh; z-index:60;
      transform:translateX(-100%); transition:transform .25s ease;
    }
    body.sb-open #sidebar{ transform:translateX(0); }
    .sb-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:55; }
    body.sb-open .sb-backdrop{ display:block; }
    .content{ padding:0 0 18px; }
    .topbar{
      display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:40;
      background:linear-gradient(135deg,var(--side1),var(--side2));
      color:#fff; padding:10px 12px; margin-bottom:12px;
      box-shadow:0 2px 10px rgba(0,0,0,.18);
    }
    .topbar .hamb{ background:rgba(255,255,255,.2); border:none; color:#fff; font-size:20px; width:40px; height:40px; border-radius:10px; cursor:pointer; }
    .topbar img{ width:30px; height:30px; border-radius:7px; background:#fff; padding:2px; object-fit:contain; }
    .topbar strong{ font-size:16px; }
    body{ font-size:12.5px; }
    #sheet{ padding:10px 8px; border-radius:0; }
    .content{ padding-left:8px; padding-right:8px; }
    .doc-title{ font-size:13.5px; }
    .region-head{ flex-wrap:wrap; }
    .region-head .rname{ flex:1 1 100%; order:2; }
    .region-head .rphone{ order:3; }
    th,td{ padding:4px 4px; }
    th.c-chk,td.c-chk{ width:30px; }
    input[type=checkbox]{ width:20px; height:20px; font-size:16px; }
    .tbl table{ min-width:380px; }
  }
  @media print{
    #app{ display:block; }
    .content{ padding:0; }
    #sheet{ box-shadow:none; border-radius:0; }
    .tbl{ overflow:visible; } .tbl table{ min-width:0; }
  }

  /* ---------- ಮೋಡಲ್ (ನೇಟಿವ್ popup ಬದಲಿಗೆ) ---------- */
  .modal-wrap{
    position:fixed; inset:0; z-index:200; display:none;
    align-items:center; justify-content:center;
    background:rgba(15,20,25,.45); padding:18px;
  }
  .modal-wrap.open{ display:flex; }
  .modal{
    background:#fff; border-radius:14px; box-shadow:0 16px 48px rgba(0,0,0,.28);
    width:100%; max-width:380px; padding:22px 22px 18px;
    animation:modalpop .15s ease;
  }
  @keyframes modalpop{ from{ transform:scale(.95); opacity:0 } to{ transform:scale(1); opacity:1 } }
  .modal-title{ font-weight:700; font-size:16px; margin-bottom:6px; }
  .modal-title:empty{ display:none; }
  .modal-body{ font-size:13.5px; color:#333; line-height:1.55; white-space:pre-line; }
  .modal-input{
    width:100%; margin-top:14px; font-family:inherit; font-size:16px;
    padding:10px 12px; border:1px solid #b9c1ca; border-radius:8px;
  }
  .modal-input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(0,187,102,.25); }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
  .modal-actions .tb{ min-width:78px; padding:9px 14px; }

  /* ---------- ಟೋಸ್ಟ್ (ದೊಡ್ಡ, ಸ್ಪಷ್ಟ ಸೂಚನೆ) ---------- */
  #toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(24px);
    z-index:300; min-width:220px; max-width:92vw; text-align:center;
    padding:14px 22px; border-radius:12px;
    font-size:16px; font-weight:700; color:#fff; background:#34495e;
    box-shadow:0 8px 26px rgba(0,0,0,.30);
    opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  #toast.ok{   background:#0b8a4f; }
  #toast.warn{ background:#c0392b; }
  #toast.info{ background:#34495e; }
  @media (max-width:640px){ #toast{ font-size:15px; left:8px; right:8px; transform:translateY(24px); max-width:none; } #toast.show{ transform:translateY(0); } }
  @media print{ #toast{ display:none !important; } }
</style>
</head>
<body>

  <!-- ---------- ಲಾಗಿನ್ ಪರದೆ (ಲಾಗಿನ್ ಆಗುವವರೆಗೆ ತೋರಿಸುತ್ತದೆ) ---------- -->
  <div id="login">
    <div class="card">
      <img class="logo" src="logo.png" alt="ಉಪ್ರಳ್ಳಿ ಸೇವೆ">
      <h2>ಉಪ್ರಳ್ಳಿ ಸೇವೆ</h2>
      <p>ಮುಂದುವರಿಯಲು ನಿಮ್ಮ ಅನುಮತಿ ಪಡೆದ Google ಖಾತೆಯಿಂದ ಲಾಗಿನ್ ಆಗಿ.</p>
      <button class="gbtn" onclick="toggleAuth()">
        <span style="font-size:17px">G</span> Google ಮೂಲಕ ಲಾಗಿನ್
      </button>
      <div class="checking" id="loginChecking">ಪರಿಶೀಲಿಸಲಾಗುತ್ತಿದೆ…</div>

  <!-- ---------- ಸಾಮಾನ್ಯ ಮೋಡಲ್ (alert / confirm / prompt) ---------- -->
  <div id="modal" class="modal-wrap no-print" aria-hidden="true">

  <div id="toast" class="no-print"></div>

  <div id="app">

    <!-- ===== ಮುಖ್ಯ ವಿಷಯ ===== -->
    <main class="content">

  <!-- Firebase (ಕ್ಲೌಡ್ ಸಿಂಕ್) — compat SDK, ಜಾಗತಿಕ `firebase` ಒದಗಿಸುತ್ತದೆ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <script src="data.js"></script>
  <script>
  /* ===================== Firebase ಸಂರಚನೆ (config) ===================== */
  const firebaseConfig = {
    apiKey: "AIzaSyA7_0pAUvA_lF6rCYw2xuS8VBGGO4Bm97s",
    authDomain: "upralliseva.firebaseapp.com",
    projectId: "upralliseva",
    storageBucket: "upralliseva.firebasestorage.app",
    messagingSenderId: "815987668986",
    appId: "1:815987668986:web:37bcfc3388061f82afd643"
  };

  /* 👉 ಸಂಪಾದಿಸಬಹುದಾದವರ Gmail ವಿಳಾಸಗಳು (whitelist).
     ಖಾಲಿ ಬಿಟ್ಟರೆ — ಲಾಗಿನ್ ಆದ ಯಾರಾದರೂ ಸಂಪಾದಿಸಬಹುದು (Firestore rules ರಕ್ಷಿಸುತ್ತದೆ).
     ಭದ್ರತೆಯ ನಿಜವಾದ ಜಾರಿ Firestore rules ನಲ್ಲಿ — ಇದು ಬರೀ UI ಗೇಟ್. */
  const ALLOWED_EDITORS = [
    "thanthrajnaani@gmail.com",
  ];

  const CLOUD = !!firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith("PASTE");
  let db=null, auth=null, DOC=null, unsub=null;
  if(CLOUD){
    firebase.initializeApp(firebaseConfig);
    db   = firebase.firestore();
    auth = firebase.auth();
  }

  /* ===================== ವರ್ಷ + ಸ್ಥಿತಿ (year & state) ===================== */
  const YEAR_KEY = "poojaYear";
  const TITLE_FOR = y => y + "ರಲ್ಲಿ ಹೂವಿನ ಪೂಜೆ, ವಿಶ್ವಕರ್ಮ ಪೂಜೆ, ನವರಾತ್ರಿ ಪೂಜೆ ಮಾಡಿಸಿದವರು";

  let currentYear = parseInt(localStorage.getItem(YEAR_KEY),10) || 2025;
  let canEdit = false;            // ಲಾಗಿನ್ + whitelist ಆದಾಗ ಮಾತ್ರ true
  let docExists = undefined;      // ಆಯ್ದ ವರ್ಷದ ಕ್ಲೌಡ್ ದಾಖಲೆ ಇದೆಯೇ
  let lastRemoteJSON = null;      // ನಮ್ಮದೇ ಬರಹದ ಪ್ರತಿಧ್ವನಿ ಬಿಟ್ಟುಬಿಡಲು
  let dirty = false;              // ಉಳಿಯದ ಸ್ಥಳೀಯ ಬದಲಾವಣೆ ಇದೆಯೇ (ರಿಮೋಟ್ ಮೇಲ್ಬರಹ ತಡೆಯಲು)
  let openRegions = new Set([0]); // ತೆರೆದಿರುವ ಮಾಗಣೆಗಳು (ಮೊದಲನೆಯದು ಪೂರ್ವನಿಯೋಜಿತ)
  let state = loadLocalYear() || yearTemplate(currentYear);

  const lsKey = () => "poojaRecord_" + currentYear;

  function seedYear(){
    const m = String(window.SEED.title||"").match(/(\d{4})/);
    return m ? parseInt(m[1],10) : null;
  }
  /* ಹೊಸ ವರ್ಷಕ್ಕೆ ಟೆಂಪ್ಲೇಟ್ — ಮಾಗಣೆ/ಹೆಸರು (data.js) ಪೂರ್ವಭರ್ತಿ.
     data.js ನ ಮೂಲ ವರ್ಷಕ್ಕೆ ಅದರ ಆಯ್ಕೆಗಳನ್ನು ಉಳಿಸಿಕೊಳ್ಳುತ್ತದೆ;
     ಬೇರೆ ವರ್ಷಕ್ಕೆ ಪೂಜಾ ಆಯ್ಕೆ ಖಾಲಿಯಾಗಿ ಆರಂಭ. */
  function yearTemplate(year){
    const t = structuredClone(window.SEED);
    t.title = TITLE_FOR(year);
    t.year  = year;
    if(year !== seedYear()){
      t.regions.forEach(r => r.families.forEach(f => { f.c = "00000"; }));
    }
    return t;
  }

  function loadLocalYear(){
    try{ const s=localStorage.getItem("poojaRecord_"+currentYear); return s?JSON.parse(s):null; }
    catch(e){ return null; }
  }
  function saveLocalYear(){ try{ localStorage.setItem(lsKey(), JSON.stringify(state)); }catch(e){} }

  let saveTimer=null;
  function save(){
    dirty = true;                                  // ಸ್ಥಳೀಯ ಬದಲಾವಣೆ ಇದೆ
    saveLocalYear();                               // ಯಾವಾಗಲೂ ಸ್ಥಳೀಯ ಪ್ರತಿ
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>{
      if(CLOUD && canEdit && auth.currentUser) pushNow();
      else { dirty=false; flash("✓ ಈ ಸಾಧನದಲ್ಲಿ ಉಳಿಸಲಾಗಿದೆ"); saveResult(true); }
    },500);
  }
  /* state → Firestore ರಚನಾತ್ಮಕ ದಾಖಲೆ (native fields/objects, JSON string ಅಲ್ಲ) */
  function toDoc(){
    return {
      title:   state.title,
      columns: state.columns,
      year:    currentYear,
      regions: state.regions.map(r => ({
        no: r.no, name: r.name, phone: r.phone || "",
        families: (r.families||[]).map(f => ({ n: f.n || "", c: f.c || "00000" }))
      }))
    };
  }
  /* Firestore ದಾಖಲೆ → state (ಪ್ರತಿಧ್ವನಿ ಪತ್ತೆಗೆ ಸಹಿ/signature ಬಳಸುತ್ತೇವೆ) */
  function fromDoc(d){
    return {
      title:   d.title || TITLE_FOR(currentYear),
      columns: d.columns || structuredClone(window.SEED.columns),
      year:    d.year || currentYear,
      regions: (d.regions || []).map(r => ({
        no: r.no, name: r.name, phone: r.phone || "",
        families: (r.families||[]).map(f => ({ n: f.n || "", c: f.c || "00000" }))
      }))
    };
  }
  const sigOf = obj => JSON.stringify({title:obj.title, columns:obj.columns, regions:obj.regions});

  function pushNow(){
    if(!(CLOUD && auth && auth.currentUser && DOC)) return;
    const doc = toDoc();
    lastRemoteJSON = sigOf(doc);                    // ನಮ್ಮ ಬರಹದ ಪ್ರತಿಧ್ವನಿ ಗುರುತಿಸಲು
    DOC.set(Object.assign({}, doc, { updatedAt: firebase.firestore.FieldValue.serverTimestamp() }))
      .then(()=>{ dirty=false; flash("✓ ಕ್ಲೌಡ್‌ನಲ್ಲಿ ಉಳಿಸಲಾಗಿದೆ ("+currentYear+")"); saveResult(true); })
      .catch(err=>{ dirty=false; flash("⚠ ಕ್ಲೌಡ್ ಉಳಿಸಲಾಗಲಿಲ್ಲ: "+(err.code||err.message)); saveResult(false); });
  }
  function flash(msg){ const s=document.getElementById('status'); s.textContent=msg; }

  /* ===================== ಟೋಸ್ಟ್ (ಸ್ಪಷ್ಟ ಸೂಚನೆ) ===================== */
  let _toastTimer=null;
  function toast(msg, kind, ms){
    const t=document.getElementById('toast'); if(!t) return;
    t.textContent=msg;
    t.className="no-print show "+(kind||"info");
    clearTimeout(_toastTimer);
    _toastTimer=setTimeout(()=>{ t.classList.remove('show'); }, ms||2200);
  }
  /* ಒಂದು ಕ್ರಿಯೆ (ಚೆಕ್/ಸಾಲು/ಮಾಗಣೆ) ಆದ ಮೇಲೆ ಉಳಿತಾಯ ಫಲಿತಾಂಶ ತೋರಿಸಲು */
  let pendingSaveMsg=null;
  function notifyAction(prefix, kind){
    pendingSaveMsg = prefix;
    toast(prefix+" • ಉಳಿಸಲಾಗುತ್ತಿದೆ…", kind||"info", 6000);
  }
  function saveResult(ok){
    if(pendingSaveMsg==null) return;
    if(ok) toast(pendingSaveMsg+" • ✓ ಉಳಿಸಲಾಗಿದೆ", "ok", 1800);
    else   toast(pendingSaveMsg+" • ⚠ ಉಳಿಯಲಿಲ್ಲ — ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ", "warn", 4000);
    pendingSaveMsg=null;
  }

  /* ===================== ಮೋಡಲ್ (alert / confirm / prompt ಬದಲಿಗೆ) ===================== */
  const _modal = { wrap:null, resolve:null, mode:"alert" };
  function modalInit(){
    _modal.wrap = document.getElementById('modal');
    document.getElementById('modalOk').onclick = ()=>modalClose(true);
    document.getElementById('modalCancel').onclick = ()=>modalClose(false);
    document.getElementById('modalInput').addEventListener('keydown', e=>{
      if(e.key==="Enter"){ e.preventDefault(); modalClose(true); }
    });
    _modal.wrap.addEventListener('keydown', e=>{ if(e.key==="Escape") modalClose(false); });
    _modal.wrap.addEventListener('mousedown', e=>{ if(e.target===_modal.wrap) modalClose(false); });
  }
  function modalOpen(opts){
    return new Promise(res=>{
      _modal.resolve = res; _modal.mode = opts.mode;
      document.getElementById('modalTitle').textContent = opts.title||"";
      document.getElementById('modalBody').textContent  = opts.body||"";
      const inp = document.getElementById('modalInput');
      if(opts.mode==="prompt"){ inp.style.display="block"; inp.value = opts.value!=null?opts.value:""; }
      else { inp.style.display="none"; }
      document.getElementById('modalCancel').style.display = (opts.mode==="alert") ? "none" : "";
      document.getElementById('modalOk').textContent = opts.ok || "ಸರಿ";
      _modal.wrap.classList.add('open');
      setTimeout(()=>{
        if(opts.mode==="prompt"){ inp.focus(); inp.select(); }
        else document.getElementById('modalOk').focus();
      }, 40);
    });
  }
  function modalClose(ok){
    if(!_modal.resolve) return;
    const inp = document.getElementById('modalInput');
    const r = _modal.resolve; _modal.resolve = null;
    _modal.wrap.classList.remove('open');
    if(_modal.mode==="prompt") r(ok ? inp.value : null);
    else r(!!ok);
  }
  const uiAlert   = (body,title)        => modalOpen({mode:"alert",   body, title});
  const uiConfirm = (body,title)        => modalOpen({mode:"confirm", body, title});
  const uiPrompt  = (body,value,title)  => modalOpen({mode:"prompt",  body, value, title});

  function isEditingNow(){
    const a=document.activeElement;
    return a && sheet.contains(a) && (a.isContentEditable || a.type==="checkbox");
  }

  /* ===================== ಸಹಾಯಕಗಳು ===================== */
  const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const checks = c => { const a=[]; const s=(c||"").padEnd(5,"0"); for(let i=0;i<5;i++) a.push(s[i]==="1"); return a; };

  /* ===================== ರೆಂಡರ್ ===================== */
  function render(){
    const cols = state.columns;
    let total = state.regions.reduce((n,r)=>n+r.families.length,0);

    const ce = canEdit ? "contenteditable" : "";
    const done = state.regions.reduce((n,r)=>n+r.families.filter(f=>String(f.c||"").includes("1")).length,0);
    let html = `
      <div class="dash no-print">
        <div class="card"><div class="v">${state.regions.length}</div><div class="l">ಮಾಗಣೆ</div></div>
        <div class="card"><div class="v">${total}</div><div class="l">ಹೆಸರು</div></div>
        <div class="card"><div class="v">${done}</div><div class="l">ಪೂಜೆ ಸಲ್ಲಿಸಿದ್ದಾರೆ</div></div>
        <div class="card"><div class="v">${currentYear}</div><div class="l">ವರ್ಷ</div></div>
      </div>
      <div class="doc-title" ${ce} data-t="title">${esc(state.title)}</div>
      <div class="legend no-print">
        ಕಾಲಂಗಳು: <b>${cols.map(esc).join(" · ")}</b>
        &nbsp;|&nbsp; ✓ = ಪೂಜೆ ಮಾಡಿಸಿದ್ದಾರೆ
      </div>`;

    state.regions.forEach((r,ri)=>{
      const open = openRegions.has(ri);
      html += `<div class="region ${open?'':'collapsed'}" id="reg-${ri}">
        <div class="region-head">
          <button class="rtoggle no-print" onclick="toggleRegion(${ri})" title="ತೆರೆ / ಮುಚ್ಚು">▾</button>
          <span class="no" ${ce} data-r="${ri}" data-f="no">${esc(r.no)}</span>
          <span class="rname" ${ce} data-r="${ri}" data-f="name">${esc(r.name)}</span>
          <span class="rcount no-print">${r.families.length}</span>
          <span class="rphone" ${ce} data-r="${ri}" data-f="phone">${esc(r.phone)}</span>
          <button class="tb warn no-print edit-only" style="padding:3px 8px" onclick="delRegion(${ri})">ಅಳಿಸು</button>
        </div>
        <div class="tbl"><table>
          <thead><tr>
            <th class="c-no">ಕ್ರ.</th>
            <th class="c-name">ಹೆಸರು / ವಿಳಾಸ</th>
            ${cols.map(c=>`<th class="c-chk">${esc(c)}</th>`).join("")}
            <th class="c-del no-print"></th>
          </tr></thead>
          <tbody>`;

      if(r.families.length===0){
        html += `<tr><td class="empty-note" colspan="${cols.length+3}">— ಇನ್ನೂ ಹೆಸರು ಸೇರಿಸಿಲ್ಲ. ಕೆಳಗಿನ “+ ಹೆಸರು ಸೇರಿಸಿ” ಒತ್ತಿ —</td></tr>`;
      } else {
        r.families.forEach((f,fi)=>{
          const ck = checks(f.c);
          html += `<tr>
            <td class="c-no">${fi+1}</td>
            <td class="c-name"><div ${ce} data-r="${ri}" data-f="${fi}" data-k="n">${esc(f.n)}</div></td>
            ${ck.map((on,ci)=>`<td class="c-chk"><input type="checkbox" data-r="${ri}" data-f="${fi}" data-c="${ci}" ${on?"checked":""} ${canEdit?"":"disabled"}></td>`).join("")}
            <td class="c-del no-print edit-only"><button class="rowdel" title="ಸಾಲು ಅಳಿಸು" onclick="delRow(${ri},${fi})">✕</button></td>
          </tr>`;
        });
      }

      html += `</tbody></table></div>
        <div class="rowctrl no-print edit-only"><button onclick="addRow(${ri})">+ ಹೆಸರು ಸೇರಿಸಿ</button></div>
      </div>`;
    });

    document.getElementById('sheet').innerHTML = html;
    buildJump();
    updateYearUI();
  }

  function updateYearUI(){
    const yl=document.getElementById('yearLabel');
    if(yl) yl.textContent = currentYear;
    const sel=document.getElementById('yearSel');
    if(sel && sel.value!==String(currentYear)) sel.value=String(currentYear);
    document.title = "ಉಪ್ರಳ್ಳಿ ಸೇವೆ — " + currentYear;
  }

  /* ಮಾಗಣೆ ಬಾಕ್ಸ್ ತೆರೆ/ಮುಚ್ಚು (full re-render ಇಲ್ಲದೆ) */
  function toggleRegion(ri){
    const el=document.getElementById('reg-'+ri);
    if(!el) return;
    if(openRegions.has(ri)){ openRegions.delete(ri); el.classList.add('collapsed'); }
    else { openRegions.add(ri); el.classList.remove('collapsed'); }
  }

  /* ✓ ಬದಲಾದಾಗ ಡ್ಯಾಶ್‌ಬೋರ್ಡ್ ಎಣಿಕೆ ತಕ್ಷಣ ನವೀಕರಣ (full re-render ಇಲ್ಲದೆ) */
  function updateDash(){
    const total = state.regions.reduce((n,r)=>n+r.families.length,0);
    const done = state.regions.reduce((n,r)=>n+r.families.filter(f=>String(f.c||"").includes("1")).length,0);
    const v = document.querySelectorAll('.dash .card .v');
    if(v.length>=4){ v[0].textContent=state.regions.length; v[1].textContent=total; v[2].textContent=done; v[3].textContent=currentYear; }
  }

  function buildJump(){
    const panel=document.getElementById('mpickPanel');
    if(!panel) return;
    panel.innerHTML = state.regions.map((r,i)=>
      `<div class="mpick-item" onclick="gotoRegion(${i})">
         <span>${esc(r.no)}. ${esc(r.name)}</span>
         <span class="mpick-badge">${r.families.length}</span>
       </div>`).join("");
  }
  function toggleMpick(){
    const m=document.getElementById('mpick'); if(!m) return;
    if(m.classList.contains('open')){ closeMpick(); return; }
    const btn=m.querySelector('.mpick-btn'); const p=document.getElementById('mpickPanel');
    const r=btn.getBoundingClientRect();
    p.style.left=r.left+'px'; p.style.top=(r.bottom+6)+'px'; p.style.width=Math.max(r.width,220)+'px';
    m.classList.add('open');
  }
  function closeMpick(){ const m=document.getElementById('mpick'); if(m) m.classList.remove('open'); }
  function gotoRegion(idx){
    if(!openRegions.has(idx)) toggleRegion(idx);
    const el=document.getElementById('reg-'+idx);
    if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
    const r=state.regions[idx];
    const lbl=document.getElementById('mpickLabel');
    if(lbl && r) lbl.textContent = (r.no!=null?r.no+". ":"") + (r.name||"");
    closeMpick();
  }
  document.addEventListener('click', e=>{
    const m=document.getElementById('mpick');
    if(m && m.classList.contains('open') && !m.contains(e.target)) closeMpick();
  });
  window.addEventListener('resize', closeMpick);

  /* ===================== ಸಂಪಾದನೆ (events) ===================== */
  const sheet=document.getElementById('sheet');

  // contenteditable ಪಠ್ಯ (ಹೆಸರು, ಮಾಗಣೆ ಹೆಸರು, ದೂರವಾಣಿ, ಶೀರ್ಷಿಕೆ) — ಸ್ವಯಂ ಉಳಿತಾಯ
  sheet.addEventListener('input', e=>{
    const el=e.target;
    if(el.dataset.t==="title"){ state.title=el.textContent; pendingSaveMsg="✏ ಶೀರ್ಷಿಕೆ"; save(); return; }
    if(el.dataset.r===undefined) return;
    const ri=+el.dataset.r;
    if(el.dataset.k==="n"){ state.regions[ri].families[+el.dataset.f].n=el.textContent; pendingSaveMsg="✏ ಹೆಸರು ಬದಲಾವಣೆ"; }
    else if(el.dataset.f==="no"){ state.regions[ri].no=el.textContent; pendingSaveMsg="✏ ಮಾಗಣೆ ಸಂಖ್ಯೆ"; }
    else if(el.dataset.f==="name"){ state.regions[ri].name=el.textContent; pendingSaveMsg="✏ ಮಾಗಣೆ ಹೆಸರು"; }
    else if(el.dataset.f==="phone"){ state.regions[ri].phone=el.textContent; pendingSaveMsg="✏ ದೂರವಾಣಿ"; }
    save();
  });

  // ಚೆಕ್‌ಬಾಕ್ಸ್
  sheet.addEventListener('change', e=>{
    if(e.target.type!=="checkbox") return;
    const ri=+e.target.dataset.r, fi=+e.target.dataset.f, ci=+e.target.dataset.c;
    const fam=state.regions[ri].families[fi];
    const arr=checks(fam.c); arr[ci]=e.target.checked;
    fam.c=arr.map(b=>b?"1":"0").join("");
    const col = (state.columns[ci]||"").trim();
    const person = (fam.n||"").split(",")[0].trim();        // ಹೆಸರು (ಮೊದಲ ಭಾಗ)
    if(e.target.checked) notifyAction("✓ "+col+" ಸೇರಿಸಲಾಗಿದೆ"+(person?" — "+person:""), "ok");
    else                 notifyAction("✗ "+col+" ತೆಗೆಯಲಾಗಿದೆ"+(person?" — "+person:""), "warn");
    updateDash();        // "ಪೂಜೆ ಸಲ್ಲಿಸಿದ್ದಾರೆ" ಎಣಿಕೆ ತಕ್ಷಣ ನವೀಕರಿಸು
    save();
  });

  /* ===================== ಸಾಲು/ಮಾಗಣೆ ಕ್ರಿಯೆಗಳು ===================== */
  function addRow(ri){ state.regions[ri].families.push({n:"",c:"00000"}); notifyAction("➕ ಹೊಸ ಸಾಲು ಸೇರಿಸಲಾಗಿದೆ","ok"); save(); render(); }
  function delRow(ri,fi){ state.regions[ri].families.splice(fi,1); notifyAction("🗑 ಸಾಲು ತೆಗೆಯಲಾಗಿದೆ","warn"); save(); render(); }
  async function delRegion(ri){
    if(!(await uiConfirm(`“${state.regions[ri].name}” ಮಾಗಣೆಯನ್ನು ಅಳಿಸಬೇಕೆ?`, "ಮಾಗಣೆ ಅಳಿಸಿ"))) return;
    state.regions.splice(ri,1); notifyAction("🗑 ಮಾಗಣೆ ತೆಗೆಯಲಾಗಿದೆ","warn"); save(); render();
  }
  function addRegion(){
    const no = state.regions.length? (parseInt(state.regions[state.regions.length-1].no)||state.regions.length)+1 : 1;
    state.regions.push({no:no, name:"ಹೊಸ ಮಾಗಣೆ", phone:"", families:[]});
    notifyAction("➕ ಹೊಸ ಮಾಗಣೆ ಸೇರಿಸಲಾಗಿದೆ","ok");
    save(); render();
    document.getElementById('reg-'+(state.regions.length-1)).scrollIntoView({behavior:"smooth"});
  }

  /* ===================== ರಫ್ತು / ಆಮದು / ಮರುಹೊಂದಿಸು ===================== */
  function exportJSON(){
    const blob=new Blob([JSON.stringify(state,null,1)],{type:"application/json"});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download="pooja-dakhale-"+currentYear+".json"; a.click();
    URL.revokeObjectURL(a.href);
  }
  function importJSON(input){
    const file=input.files[0]; if(!file) return;
    const rd=new FileReader();
    rd.onload=()=>{ try{ state=JSON.parse(rd.result); save(); render(); flash("✓ ಆಮದಾಯಿತು"); }
      catch(e){ uiAlert("ಸರಿಯಾದ JSON ಕಡತವಲ್ಲ", "ದೋಷ"); } input.value=""; };
    rd.readAsText(file);
  }
  async function resetAll(){
    if(!(await uiConfirm(currentYear+" ವರ್ಷದ ಎಲ್ಲ ಪೂಜಾ ಆಯ್ಕೆಗಳನ್ನು ಅಳಿಸಿ ಪೂರ್ವಭರ್ತಿ ಪಟ್ಟಿಗೆ ಮರಳಬೇಕೆ?", "ಮೂಲಕ್ಕೆ ಮರಳಿ"))) return;
    state=yearTemplate(currentYear); save(); render(); flash("ಪೂರ್ವಭರ್ತಿ ಪಟ್ಟಿಗೆ ಮರಳಿದೆ");
  }
  async function deleteYear(){
    if(!(CLOUD && canEdit && db)){ uiAlert("ಲಾಗಿನ್ ಆಗಿರಬೇಕು.", "ದೋಷ"); return; }
    const y = currentYear;
    if(!(await uiConfirm(y+" ವರ್ಷದ ಎಲ್ಲ ದತ್ತಾಂಶವನ್ನು ಶಾಶ್ವತವಾಗಿ ಅಳಿಸಬೇಕೆ? ಇದನ್ನು ಹಿಂಪಡೆಯಲಾಗದು.", "ವರ್ಷ "+y+" ಅಳಿಸಿ"))) return;
    try{ await db.collection("pooja").doc(String(y)).delete(); }
    catch(e){ toast("⚠ ಅಳಿಸಲಾಗಲಿಲ್ಲ: "+(e.code||e.message), "warn", 4000); return; }
    try{ localStorage.removeItem("poojaRecord_"+y); }catch(e){}
    toast("🗑 ವರ್ಷ "+y+" ಅಳಿಸಲಾಗಿದೆ", "ok");
    let years=[];
    try{ const snap=await db.collection("pooja").get(); years=snap.docs.map(d=>parseInt(d.id,10)).filter(Boolean).filter(x=>x!==y).sort((a,b)=>b-a); }catch(e){}
    switchToYear(years.length ? years[0] : (seedYear() || (y-1)));
  }

  /* ===================== PDF ಡೌನ್‌ಲೋಡ್ (ಬ್ರೌಸರ್‌ನ ಸ್ವಂತ ಮುದ್ರಣ) =====================
     ಟಿಪ್ಪಣಿ: html2canvas/html2pdf ಕನ್ನಡ ಒತ್ತಕ್ಷರಗಳನ್ನು ಚಿತ್ರವಾಗಿ ಪರಿವರ್ತಿಸಿ
     ಒಡೆಯುತ್ತದೆ. ಆದ್ದರಿಂದ ಬ್ರೌಸರ್‌ನ ಸ್ವಂತ ಮುದ್ರಣವನ್ನು ಬಳಸುತ್ತೇವೆ —
     ಇದು ಕನ್ನಡ ಫಾಂಟ್‌ಅನ್ನು ಸರಿಯಾಗಿ ತೋರಿಸುತ್ತದೆ, ಎಲ್ಲ ಮೌಲ್ಯಗಳನ್ನೂ ಸೇರಿಸುತ್ತದೆ,
     ಮತ್ತು ಯಾವುದೇ ಲೈಬ್ರರಿ/ಇಂಟರ್ನೆಟ್ ಬೇಕಿಲ್ಲ. ಮುದ್ರಣ ಸಂವಾದದಲ್ಲಿ
     "Save as PDF" / "PDF ಆಗಿ ಉಳಿಸಿ" ಆಯ್ಕೆ ಮಾಡಿ. */
  async function downloadPDF(btn){
    btn.disabled=true; const old=btn.textContent; btn.textContent="ತಯಾರಿಸುತ್ತಿದೆ…";
    try{
      // ಮುದ್ರಿಸುವ ಮುನ್ನ ಫಾಂಟ್ ಲೋಡ್ ಆಗುವವರೆಗೆ ಕಾಯಿ (ಕನ್ನಡ ಸರಿಯಾಗಿ ಬರಲು)
      if(document.fonts && document.fonts.ready){ try{ await document.fonts.ready; }catch(e){} }
      document.body.classList.add('exporting');
      // ಯಾವುದೇ ಸಂಪಾದನಾ ಕರ್ಸರ್ ಮುದ್ರಣದಲ್ಲಿ ಕಾಣದಂತೆ
      if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
      window.print();
    }catch(err){
      uiAlert("ಮುದ್ರಣ ತೆರೆಯಲಾಗಲಿಲ್ಲ:\n"+err.message+"\n\nಪರ್ಯಾಯ: Ctrl+P → \"Save as PDF\" ಬಳಸಿ.", "ದೋಷ");
    }finally{
      document.body.classList.remove('exporting');
      btn.disabled=false; btn.textContent=old;
    }
  }

  /* ===================== ವರ್ಷ ಹೊಂದಿಸಿ (setup year) =====================
     ಬಳಕೆದಾರ ವರ್ಷ ನಮೂದಿಸುತ್ತಾರೆ → ಆ ವರ್ಷದ ದತ್ತಾಂಶ ತೋರಿಸುತ್ತದೆ.
     ಆ ವರ್ಷ ಇನ್ನೂ ಇಲ್ಲದಿದ್ದರೆ — ಮಾಗಣೆ/ಹೆಸರು ಪೂರ್ವಭರ್ತಿಯಾದ ಹೊಸ ಟೆಂಪ್ಲೇಟ್
     (ಪೂಜಾ ಆಯ್ಕೆ ಖಾಲಿ) ಸಿದ್ಧವಾಗುತ್ತದೆ; ಲಾಗಿನ್ ಆದವರು ಪೂಜೆ ಆಯ್ಕೆ ಮಾಡಬಹುದು. */
  function switchToYear(year){
    currentYear = year;
    localStorage.setItem(YEAR_KEY, String(year));
    state = loadLocalYear() || yearTemplate(year);   // ತಕ್ಷಣ ತೋರಿಸಲು (ಕ್ಲೌಡ್ ಬಂದ ಮೇಲೆ ನವೀಕರಣ)
    lastRemoteJSON = null;
    openRegions = new Set([0]);                      // ಹೊಸ ವರ್ಷ — ಮೊದಲ ಮಾಗಣೆ ತೆರೆ
    render();
    subscribeYear();                                 // ಆ ವರ್ಷದ ಕ್ಲೌಡ್ ದಾಖಲೆಗೆ ಸಂಪರ್ಕ
    flash("ವರ್ಷ "+year+" ಆಯ್ಕೆಯಾಗಿದೆ");
    loadYears();
  }
  async function setupYear(){
    const inp = await uiPrompt("ಹೊಸ ವರ್ಷ ನಮೂದಿಸಿ (ಉದಾ. 2027):", String(currentYear+1), "ಹೊಸ ವರ್ಷ");
    if(inp===null) return;
    const year = parseInt(String(inp).trim(),10);
    if(!year || year<2000 || year>2100){ await uiAlert("ಸರಿಯಾದ ವರ್ಷ ನಮೂದಿಸಿ (2000–2100).", "ತಪ್ಪು ವರ್ಷ"); return; }
    switchToYear(year);
  }

  /* ಕ್ಲೌಡ್‌ನಲ್ಲಿರುವ ಎಲ್ಲ ವರ್ಷಗಳ ಪಟ್ಟಿಯನ್ನು dropdown ನಲ್ಲಿ ತೋರಿಸು */
  function loadYears(){
    const sel=document.getElementById('yearSel');
    if(!sel) return;
    const fill = years=>{
      if(!years.includes(currentYear)) years.push(currentYear);
      years.sort((a,b)=>b-a);
      sel.innerHTML = years.map(y=>`<option value="${y}" ${y===currentYear?"selected":""}>${y}</option>`).join("");
    };
    if(!CLOUD){ fill([currentYear]); return; }
    db.collection("pooja").get()
      .then(snap=> fill(snap.docs.map(d=>parseInt(d.id,10)).filter(Boolean)))
      .catch(()=> fill([currentYear]));
    sel.onchange = ()=>{ const y=parseInt(sel.value,10); if(y && y!==currentYear) switchToYear(y); };
  }

  /* ===================== ಲಾಗಿನ್ / ಲಾಗ್‌ಔಟ್ (Google) =====================
     whitelist ಮೂಲ: Firestore "editors" ಸಂಗ್ರಹ — ದಾಖಲೆ ID = ಇಮೇಲ್ ವಿಳಾಸ.
     (ಮೇಲಿನ ALLOWED_EDITORS ಬರೀ ಬ್ಯಾಕಪ್/bootstrap.) */
  async function checkEditor(u){
    if(!u) return false;
    const email=(u.email||"").toLowerCase();
    if(ALLOWED_EDITORS.map(e=>e.toLowerCase()).includes(email)) return true;
    try{ const d = await db.collection("editors").doc(email).get(); return d.exists; }
    catch(e){ return false; }
  }
  function setLoginMsg(err, checking){
    const e=document.getElementById('loginErr'); if(e) e.textContent=err||"";
    const c=document.getElementById('loginChecking'); if(c) c.textContent=checking||"";
  }
  function toggleAuth(){
    if(!CLOUD){ uiAlert("ಕ್ಲೌಡ್ ಸಂರಚಿಸಿಲ್ಲ.", "ದೋಷ"); return; }
    if(auth.currentUser){ auth.signOut().then(()=>flash("ಲಾಗ್‌ಔಟ್ ಆಯಿತು")); return; }
    setLoginMsg("", "ಲಾಗಿನ್ ಆಗುತ್ತಿದೆ…");
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .catch(err=>{
        setLoginMsg(err.code==="auth/popup-closed-by-user" ? "" : ("ಲಾಗಿನ್ ವಿಫಲ: "+(err.code||err.message)), "");
      });
  }
  function updateAuthUI(u){
    const btn=document.getElementById('authBtn');
    document.body.classList.toggle('editing', canEdit);
    if(btn) btn.textContent = u ? ("ಲಾಗ್‌ಔಟ್ ("+(u.email||"")+")") : "Google ಲಾಗಿನ್";
  }

  /* ===================== ಕ್ಲೌಡ್ ಸಿಂಕ್ (ವರ್ಷವಾರು) ===================== */
  function subscribeYear(){
    if(!CLOUD) return;
    if(unsub){ unsub(); unsub=null; }
    docExists = undefined;
    DOC = db.collection("pooja").doc(String(currentYear));   // pooja/2025, pooja/2026, ...

    unsub = DOC.onSnapshot(snap=>{
      docExists = snap.exists;
      if(!snap.exists){
        // ಆ ವರ್ಷ ಇನ್ನೂ ಇಲ್ಲ — ಪೂರ್ವಭರ್ತಿ ಟೆಂಪ್ಲೇಟ್ ತೋರಿಸು (ಸ್ಥಳೀಯ ಮಾತ್ರ).
        // ಸ್ವಯಂ ರಚಿಸುವುದಿಲ್ಲ — ಬಳಕೆದಾರ ಬದಲಾವಣೆ ಮಾಡಿದಾಗಷ್ಟೇ ಕ್ಲೌಡ್‌ಗೆ ಉಳಿಯುತ್ತದೆ.
        state = loadLocalYear() || yearTemplate(currentYear);
        saveLocalYear();
        render();
        return;
      }
      // ನಮ್ಮಲ್ಲಿ ಉಳಿಯದ ಸ್ಥಳೀಯ ಬದಲಾವಣೆ (dirty) ಇದ್ದರೆ — ರಿಮೋಟ್ ದತ್ತಾಂಶ ತರಬೇಡ
      // (ಇಲ್ಲದಿದ್ದರೆ ಬರೆಯುತ್ತಿರುವ ಹೆಸರು ಮೇಲೆ ಬರೆಯಲ್ಪಡುತ್ತದೆ).
      if(dirty || isEditingNow()) return;
      const incoming = fromDoc(snap.data());        // ರಚನಾತ್ಮಕ ದಾಖಲೆ → state
      const sig = sigOf(incoming);
      if(sig !== lastRemoteJSON){
        lastRemoteJSON = sig;
        state = incoming;
        saveLocalYear();
        render();
      }
    }, err=>flash("⚠ ಕ್ಲೌಡ್ ಸಂಪರ್ಕ ದೋಷ: "+(err.code||err.message)));
  }

  function startCloud(){
    if(!CLOUD){ document.body.classList.add('authed'); setLoginMsg("ಕ್ಲೌಡ್ ಸಂರಚಿಸಿಲ್ಲ.",""); return; }
    auth.onAuthStateChanged(async u=>{
      canEdit = await checkEditor(u);
      if(u && !canEdit){                              // ಲಾಗಿನ್ ಆಗಿದೆ ಆದರೆ whitelist ನಲ್ಲಿಲ್ಲ
        document.body.classList.remove('authed');
        setLoginMsg("“"+(u.email||"")+"” ಗೆ ಅನುಮತಿ ಇಲ್ಲ. ನಿರ್ವಾಹಕರನ್ನು ಸಂಪರ್ಕಿಸಿ.", "");
        updateAuthUI(null);
        auth.signOut();
        return;
      }
      document.body.classList.toggle('authed', canEdit);
      const c=document.getElementById('loginChecking'); if(c) c.textContent="";   // "ಪರಿಶೀಲಿಸಲಾಗುತ್ತಿದೆ…" ಅಳಿಸು
      if(canEdit){
        const e=document.getElementById('loginErr'); if(e) e.textContent="";      // ಲಾಗಿನ್ ಆದಾಗ ಮಾತ್ರ ದೋಷ ಅಳಿಸು
      }
      updateAuthUI(u);
      render();
      if(canEdit){
        subscribeYear();                              // ಲಾಗಿನ್ ಆದ ಮೇಲೆ ದತ್ತಾಂಶ ಲೋಡ್ / ಆಲಿಸು
        loadYears();                                  // ವರ್ಷಗಳ dropdown ತುಂಬಿಸು
      } else if(unsub){
        unsub(); unsub=null;                          // ಲಾಗ್‌ಔಟ್ — ಆಲಿಸುವಿಕೆ ನಿಲ್ಲಿಸು
      }
    });
  }

  /* ===================== ಆರಂಭ ===================== */
  modalInit();
  render();
  startCloud();
  </script>
</body>
</html>
