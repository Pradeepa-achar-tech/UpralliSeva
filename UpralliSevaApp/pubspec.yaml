name: upralliseva_app
description: ಪೂಜಾ ದಾಖಲೆ — Upralli Seva (Android app, shares Firestore with the web app)
publish_to: "none"
version: 1.0.8+9

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.4
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
  fonts:
    - family: NotoSansKannada
      fonts:
        - asset: assets/fonts/NotoSansKannada-Regular.ttf

# ===== ಆ್ಯಪ್ ಲಾಂಚರ್ ಐಕಾನ್ (logo) =====
# ಚಿತ್ರ: assets/icon/app_icon.png (1024x1024, ಬಿಳಿ ಹಿನ್ನೆಲೆಯ logo)
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

# ===== ಆ್ಯಪ್ ಆರಂಭದ ಪರದೆ (splash) =====
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/splash.png
  android_12:
    color: "#FFFFFF"
    image: assets/icon/splash.png
